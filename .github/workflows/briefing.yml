name: Briefing Giornaliero

on:
  workflow_dispatch:
    inputs:
      slot:
        description: 'Fascia oraria (mattina / mezzogiorno / sera)'
        required: false
        default: 'mattina'
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 10 * * *'
    - cron: '0 15 * * *'

jobs:
  esegui-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice del repository
        uses: actions/checkout@v4

      - name: Prepara Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa le librerie necessarie
        run: pip install -r requirements.txt

      - name: Esegui lo script del briefing
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}
          RUN_CRON: ${{ github.event.schedule }}
          RUN_SLOT: ${{ github.event.inputs.slot }}
        run: python briefing.py
